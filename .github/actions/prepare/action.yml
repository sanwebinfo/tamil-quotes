description: Prepares the repo for a typical CI job

name: Prepare

runs:
  steps:
    - uses: pnpm/action-setup@v6.0.9
      with:
        version: 11.7.0
    - uses: actions/setup-node@v6.4.0
      with:
        node-version: '24.17.0'
        cache: pnpm
    - run: pnpm install
      shell: bash
  using: composite